  performance:
    status: PASS
    notes: "Exécution asynchrone via Celery pour ne pas bloquer l'application. Utilisation de select_related pour optimiser les requêtes DB. Les synchronisations sont échelonnées naturellement par Celery. Configuration Celery Beat avec heure configurable (défaut: 2h du matin, heure de faible trafic)."
