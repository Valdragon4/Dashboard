services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dashboard}
      POSTGRES_USER: ${POSTGRES_USER:-dashboard_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dashboard_user} -d ${POSTGRES_DB:-dashboard}"]
      interval: 5s
      timeout: 3s
      retries: 20

  web:
    build: ./backend
    command: bash -c "python manage.py migrate && gunicorn config.wsgi:application --bind 0.0.0.0:8000 --timeout 300 --workers 2"
    env_file: .env
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
    volumes:
      - ./backend:/app
      - ./trade_republic_scraper:/app/trade_republic_scraper
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"

  worker:
    build: ./backend
    command: celery -A config worker -l info
    env_file: .env
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      # Playwright laisse sa boucle asyncio dans un état "running" après certaines
      # exceptions. Le worker Celery est un contexte synchrone pur (prefork) — cette
      # variable dit à Django de ne pas bloquer les appels ORM dans ce contexte.
      - DJANGO_ALLOW_ASYNC_UNSAFE=true
    volumes:
      - ./backend:/app
    # host.docker.internal permet d'atteindre la machine hôte depuis le conteneur.
    # Nécessaire pour router le trafic BoursoBank via un tunnel SSH SOCKS5 :
    #   ssh -D 1080 -N -f user@ma-machine-perso  (sur le serveur)
      # - BOURSOBANK_PROXY=socks5://host.docker.internal:1080
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  beat:
    build: ./backend
    command: celery -A config beat -l info
    env_file: .env
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  db_data: