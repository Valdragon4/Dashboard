{% extends 'base.html' %}
{% block title %}Import de relevé{% endblock %}
{% block content %}
  <div class="max-w-xl mx-auto">
    <h1 class="text-2xl font-semibold mb-4">Importer un fichier</h1>
    <div class="bg-white rounded-xl border border-gray-200 p-5">
      <form method="post" enctype="multipart/form-data" class="space-y-4">
        {% csrf_token %}
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Type d'import</label>
          {{ form.import_type }}
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Nom du compte</label>
          {{ form.account_name }}
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Fichier CSV</label>
          {{ form.file }}
        </div>
        <button type="submit" class="px-4 py-2 bg-primary text-white rounded">Importer</button>
      </form>
    </div>
  </div>
{% endblock %}
