{% extends 'base.html' %}
{% block title %}{{ title }}{% endblock %}
{% block content %}
  <h1 class="text-2xl font-semibold mb-6">{{ title }}</h1>
  <form method="post" class="bg-white rounded-xl border border-gray-200 p-6 max-w-xl">
    {% csrf_token %}
    {{ form.non_field_errors }}
    <div class="grid grid-cols-1 gap-4">
      {% for field in form %}
        <label class="block">
          <span class="text-sm text-gray-600">{{ field.label }}</span>
          {{ field }}
          {% if field.errors %}<div class="text-sm text-red-600">{{ field.errors|striptags }}</div>{% endif %}
        </label>
      {% endfor %}
    </div>
    <div class="mt-6">
      <button class="px-4 py-2 bg-primary text-white rounded">Enregistrer</button>
    </div>
  </form>
{% endblock %}
