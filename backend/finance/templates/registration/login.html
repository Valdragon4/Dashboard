<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Connexion</title>
    <style>body{font-family:system-ui,sans-serif;margin:2rem;max-width:420px}</style>
  </head>
  <body>
    <h1>Connexion</h1>
    {% if form.errors %}
      <p style="color:#b00020">Identifiants invalides. Réessayez.</p>
    {% endif %}
    <form method="post" action="{% url 'login' %}">
      {% csrf_token %}
      <div>
        <label for="id_username">Utilisateur</label><br />
        {{ form.username }}
      </div>
      <div style="margin-top:0.5rem">
        <label for="id_password">Mot de passe</label><br />
        {{ form.password }}
      </div>
      <div style="margin-top:1rem">
        <button type="submit">Se connecter</button>
      </div>
      <input type="hidden" name="next" value="{{ next|default:'/' }}" />
    </form>
  </body>
  </html>
